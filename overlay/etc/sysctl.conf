# Level of messages on console
kernel.printk = 3 3 1 3

# Maximum number of open files system-wide (default 1024 is too low for
# MJPEG viewers, RTSP clients, SSH, and HTTP connections combined)
fs.file-max = 8192

# Increase the listen() backlog so the kernel can queue more pending
# connections while the application accept()s them
net.core.somaxconn = 128

# Prevent orphaned TCP sockets in FIN_WAIT2 from accumulating indefinitely
net.ipv4.tcp_fin_timeout = 15

# Avoid filling the connection tracking table on small-RAM devices
# (0 disables, but we just set a generous ceiling)
net.netfilter.nf_conntrack_max = 2048
