<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>thingino · Dusk2Dawn</title>
  <script src="/a/theme-init.js"></script>
  <link rel="icon" type="image/svg+xml" href="/a/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/a/main.css">
</head>

<body id="page-config-dusk2dawn">
<nav data-app-nav></nav>

<main class="pb-4">
  <div class="container" style="min-height:80vh">
    <div data-app-controls></div>

    <section>
      <form id="dusk2dawn-form" class="needs-validation" novalidate autocomplete="off">
        <div class="card mb-3">
          <div class="card-header">
            <h2 class="card-title">Dusk2Dawn</h2>
            <small>Switch day/night mode automatically at sunrise and sunset based on your location</small>
            <button type="button" class="btn btn-outline-secondary" id="dusk2dawn-reload" title="Reload values from camera">
              <i class="bi bi-arrow-clockwise"></i> Reload
            </button>
          </div><!-- .card-header -->
          <div class="card-body">
            <div class="row row-cols-lg-3 g-4">
              <div class="col">
                <p class="form-switch mt-3">
                  <input type="checkbox" id="daynight_sun_enabled" name="daynight_sun_enabled" value="true" role="switch" class="form-check-input">
                  <label for="daynight_sun_enabled" class="form-check-label">Enable Sun tracking</label>
                </p>
              </div>
              <div class="col">
                <div class="row g-1">
                  <div class="col">
                    <p>
                      <label for="daynight_sun_latitude" class="form-label">Latitude</label>
                      <input type="text" id="daynight_sun_latitude" name="daynight_sun_latitude" class="form-control" value="">
                    </p>
                  </div>
                  <div class="col">
                    <p>
                      <label for="daynight_sun_longitude" class="form-label">Longitude</label>
                      <input type="text" id="daynight_sun_longitude" name="daynight_sun_longitude" class="form-control" value="">
                    </p>
                  </div>
                </div>
                <p>
                  <button type="button" id="geolocate-btn" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-geo-alt"></i> Use my location
                  </button>
                  <a href="https://my-coordinates.com/" target="_blank" class="small ms-2">Find manually</a>
                </p>
              </div>
              <div class="col">
                <div class="row g-1">
                  <div class="col">
                    <p>
                      <label for="daynight_sun_sunrise_offset" class="form-label">Sunrise offset</label>
                      <input type="text" id="daynight_sun_sunrise_offset" name="daynight_sun_sunrise_offset" class="form-control" value="">
                      <span class="hint text-secondary">minutes</span>
                    </p>
                  </div>
                  <div class="col">
                    <p>
                      <label for="daynight_sun_sunset_offset" class="form-label">Sunset offset</label>
                      <input type="text" id="daynight_sun_sunset_offset" name="daynight_sun_sunset_offset" class="form-control" value="">
                      <span class="hint text-secondary">minutes</span>
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div><!-- .card -->

        <button type="button" id="dusk2dawn-save" class="btn btn-primary">
          <i class="bi bi-floppy me-1"></i> Save changes
        </button>
      </form>
    </section>
  </div>
</main>

<footer data-app-footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="/a/main.js"></script>
<script src="/a/runtime-config.js"></script>
<script src="/a/control-bar.js"></script>
<script src="/a/navigation.js"></script>
<script src="/a/footer.js"></script>
<script src="/a/config-dusk2dawn.js"></script>
</body>
</html>
