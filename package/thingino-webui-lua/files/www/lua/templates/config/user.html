{{include:header}}

<div class="row mb-4">
  <div class="col">
    <h1 class="h3 mb-0"><i class="bi bi-person-lock me-2"></i>User Management</h1>
    <p class="text-muted">Configure root user password and session settings</p>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card config-form">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="bi bi-person-lock me-2"></i>Root User Settings</h5>
      </div>
      <div class="card-body">
        <form method="POST" action="/lua/config/user">
          <div class="mb-3">
            <label for="admin_password" class="form-label">Root Password</label>
            <input type="password" id="admin_password" name="admin_password" class="form-control" placeholder="Leave blank to keep current">
            <div class="form-text">Minimum 8 characters for root user</div>
          </div>
          <div class="mb-3">
            <label for="admin_password_confirm" class="form-label">Confirm Password</label>
            <input type="password" id="admin_password_confirm" name="admin_password_confirm" class="form-control" placeholder="Confirm new password">
          </div>
          <div class="mb-3">
            <label for="session_timeout" class="form-label">Session Timeout (min)</label>
            <input type="number" id="session_timeout" name="session_timeout" class="form-control" value="{{config_session_timeout}}" min="5" max="1440">
            <div class="form-text">Auto logout after inactivity</div>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save User Settings</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
    // Password confirmation validation
    document.getElementById('admin_password_confirm').addEventListener('input', function() {
        const password = document.getElementById('admin_password').value;
        const confirm = this.value;

        if (password && confirm && password !== confirm) {
            this.setCustomValidity('Passwords do not match');
        } else {
            this.setCustomValidity('');
        }
    });
</script>

{{include:footer}}
