user root;
worker_processes 1;
error_log /var/log/nginx/error.log;
pid /var/run/nginx.pid;

events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    access_log /var/log/nginx/access.log;
    
    sendfile on;
    keepalive_timeout 65;
    
    server {
        listen 80;
        server_name _;
        
        root /var/www;
        index index.html;
        
        location / {
            try_files $uri $uri/ @legacy_url_recovery;
        }

        location @legacy_url_recovery {
            add_header Clear-Site-Data "\"cache\"" always;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            default_type text/html;
            return 200 '<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=/"><title>Redirecting...</title></head><body><script>window.location.replace("/");</script></body></html>';
        }
        
        location ~ \.cgi$ {
            gzip off;
            fastcgi_pass unix:/var/run/fcgiwrap.socket;
            include /etc/nginx/fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
        
        location /x/ {
            auth_basic "Authentication";
            auth_basic_user_file /etc/httpd.passwd;
        }
    }
}
