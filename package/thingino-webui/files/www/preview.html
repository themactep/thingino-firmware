            </button>
          </div><!-- .card-header -->
          <div class="card-body">
            <div id="frame" class="position-relative mb-2">
              <img id="preview" src="/a/nostream.svg" class="img-fluid" alt="Image: Preview" tabindex="-1" data-stream="ch0">
            </div>
            <div class="position-absolute top-50 start-50 translate-middle" id="motor-overlay" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script>
/**
 * SEI OSD Overlay Renderer — SVG-based.
 * Polls /x/json-osd-sei.cgi and renders OSD as SVG <text> elements
 * over the MJPEG preview.  SVG gives proper variable-width text strokes.
 */
(function () {
  'use strict';
  var POLL_MS = 1000, OVERLAY_ID = 'sei-osd-overlay', IMG_ID = 'preview';
  var SEI_URL = '/x/json-osd-sei.cgi', timer = null;

  function pcol(h, dflt) {
    if (!h || h.length < 7) return dflt || '#ffffff';
    return h.slice(0,7);
  }
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function repaint() {
    window._seiRepaint = repaint;
    var img = document.getElementById(IMG_ID);
    var svg = document.getElementById(OVERLAY_ID);
    if (!img || !svg) return;
    var cw = img.clientWidth, ch = img.clientHeight;
    if (!cw || !ch || !svg.dataset.sw) return;
    var sw = parseFloat(svg.dataset.sw), sh = parseFloat(svg.dataset.sh);
    var rot = parseInt(svg.dataset.rot) || 0;
    var sx = cw / (sw || 1), sy = ch / (sh || 1);
    var fs = parseInt(svg.dataset.fs) || 16;
    var fsOrig = parseInt(svg.dataset.fsOrig) || fs;
    var stw = svg.dataset.stw || '1.5';
    var fw = svg.dataset.fw || 'normal';
    var fscale = fs / (fsOrig || 1);  // scale w/h when font size changes

    img.style.transform = rot ? 'rotate(' + rot + 'deg)' : '';
    var frame = document.getElementById('frame');
    if (frame) frame.style.minHeight = (rot === 90 || rot === 270) ? cw + 'px' : '';

    var vw, vh;
    if (rot === 90 || rot === 270) {
      vw = ch; vh = cw;
      svg.style.left = ((cw - ch) / 2) + 'px'; svg.style.top = '0';
      img.style.marginTop = ((cw - ch) / 2) + 'px';
    } else {
      vw = cw; vh = ch;
      svg.style.left = '0'; svg.style.top = '0';
      img.style.marginTop = '';
    }
    svg.setAttribute('viewBox', '0 0 ' + vw + ' ' + vh);
    svg.setAttribute('width', vw);
    svg.setAttribute('height', vh);

    var texts = svg.querySelectorAll('text');
    for (var i = 0; i < texts.length; i++) {
      var c = texts[i];
      var rx = parseFloat(c.dataset.rx)||0, ry = parseFloat(c.dataset.ry)||0;
      var rw = parseFloat(c.dataset.rw)||0, rh = parseFloat(c.dataset.rh)||0;
      rw *= fscale; rh *= fscale;
      var x, y, anchor, baseline;
      if (rx > 0)      { x = rx * sx;      anchor = 'start'; }
      else if (rx < 0) { x = vw + rx * sx; anchor = 'end'; }
      else             { x = vw / 2;       anchor = 'middle'; }
      if (ry > 0)      { y = ry * sy;      baseline = 'hanging'; }
      else if (ry < 0) { y = vh + ry * sy; baseline = 'text-after-edge'; }
      else             { y = vh / 2;       baseline = 'central'; }
      c.setAttribute('x', x);
      c.setAttribute('y', y);
      c.setAttribute('text-anchor', anchor);
      c.setAttribute('dominant-baseline', baseline);
      c.setAttribute('font-size', fs);
      c.setAttribute('font-weight', fw);
      c.setAttribute('stroke-width', stw);
    }

    var fsi = document.getElementById('preview_fullsize');
    if (fsi && fsi.src && fsi.src.indexOf('nostream') === -1) {
      fsi.style.transform = rot ? 'rotate(' + rot + 'deg)' : '';
    }
  }

  async function poll() {
    try {
      var r = await fetch(SEI_URL);
      if (!r.ok) return;
      var d = await r.json();
      if (!d || !d.elements || !d.elements.length) return;
      var svg = document.getElementById(OVERLAY_ID);
      var frame = document.getElementById('frame');
      var img = document.getElementById(IMG_ID);
      if (!img || !frame) return;

      var structKey = '';
      for (var i = 0; i < d.elements.length; i++) {
        structKey += d.elements[i].t + ',' + d.elements[i].x + ',' + d.elements[i].y + ',' + d.elements[i].w + ',' + d.elements[i].h + ';';
      }
      var rebuild = !svg || svg.dataset.seiHash !== structKey;

      if (!svg) {
        svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.id = OVERLAY_ID;
        svg.style.cssText = 'position:absolute;left:0;top:0;pointer-events:none;overflow:visible;z-index:10;';
        frame.appendChild(svg);
      }

      if (rebuild) {
        var h = '';
        for (var i = 0; i < d.elements.length; i++) {
          var el = d.elements[i];
          h += '<text data-rx="'+el.x+'" data-ry="'+el.y+'" data-rw="'+el.w+'" data-rh="'+el.h+'" data-sei-type="'+el.t+'" fill="'+pcol(el.color,'#ffffff')+'" stroke="'+pcol(el.stroke,'#000000')+'">'+esc(el.text)+'</text>';
        }
        svg.innerHTML = h;
        svg.dataset.sw = d.sw || 0;
        svg.dataset.sh = d.sh || 0;
        svg.dataset.rot = d.rotation || 0;
        svg.dataset.seiHash = structKey;
        // Set image dimensions from stream resolution to prevent layout shift
        if (d.sw && d.sh) {
          img.setAttribute('width', d.sw);
          img.setAttribute('height', d.sh);
        }
        if (d.elements.length) {
          svg.dataset.fs = d.elements[0].fs || 16;
          svg.dataset.fsOrig = d.elements[0].fs || 16;
        }
      } else {
        var texts = svg.querySelectorAll('text');
        for (var i = 0; i < texts.length && i < d.elements.length; i++) {
          if (texts[i].dataset.seiPrev !== d.elements[i].text) {
            texts[i].textContent = d.elements[i].text;
            texts[i].dataset.seiPrev = d.elements[i].text;
          }
        }
      }
      repaint();
    } catch (_) {}
  }

  function start() {
    if (timer) return;
    poll();
    timer = setInterval(poll, POLL_MS);
    window.addEventListener('resize', repaint);
  }
  if (document.readyState === 'loading')
    document.addEventListener('DOMContentLoaded', start);
  else
    start();
})();
</script>

<!-- OSD Settings Modal -->
<div class="modal fade" id="osdModal" tabindex="-1" aria-labelledby="osdModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="osdModalLabel">OSD Overlay Settings</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="form-switch mb-2">
          <input type="checkbox" id="osd-enabled" role="switch" class="form-check-input">
          <label for="osd-enabled" class="form-check-label">OSD enabled</label>
        </p>
        <div id="osd-elements-list" class="mb-2"></div>
        <button type="button" class="btn btn-outline-primary btn-sm w-100 mb-3" id="osd-add-element">
          <i class="bi bi-plus-lg me-1"></i> Add element
        </button>
        <details class="mb-0">
          <summary class="text-muted small">Visual settings (local only)</summary>
          <div class="row mt-2">
            <div class="col-6"><label class="form-label small">Font Size</label>
              <input type="range" class="form-range" id="osd-fontsize" min="8" max="72" value="16">
              <small class="text-muted" id="osd-fontsize-val">16</small>
            </div>
            <div class="col-6"><label class="form-label small">Outline</label>
              <input type="range" class="form-range" id="osd-stroke" min="0" max="10" value="1">
              <small class="text-muted" id="osd-stroke-val">1</small>
            </div>
          </div>
        </details>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="osd-save">Save to config</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var STORAGE_KEY = 'sei-osd-settings';
  var API = '/x/json-prudynt.cgi';
  var TYPES = ['text','gain','hostname','ipaddress','timestamp','uptime'];
  var DEFAULTS = {
    text: {format:'', position:'10,10'},
    gain: {format:'%s', position:'10,-10'},
    hostname: {format:'%s', position:'0,10'},
    ipaddress: {format:'%s', position:'0,30'},
    timestamp: {format:'%F %T', position:'10,10'},
    uptime: {format:'%02lu:%02lu:%02lu', position:'-10,10'}
  };

  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch(_) { return {}; }
  }
  function saveSettings(s) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
    catch(e) {}
  }

  function createRow(name, type, format, position) {
    var row = document.createElement('div');
    row.className = 'osd-el-row d-flex gap-1 align-items-end mb-1';
    row.innerHTML =
      '<input class="form-control form-control-sm elem-name" placeholder="id" style="flex:0 0 100px" value="' + (name||'') + '">' +
      '<select class="form-select form-select-sm elem-type" style="flex:0 0 150px">' +
        TYPES.map(function(t){ return '<option value="'+t+'"' + (t===type?' selected':'') + '>'+t+'</option>'; }).join('') +
      '</select>' +
      '<input class="form-control form-control-sm elem-format" placeholder="format" style="flex:1 1 auto" value="' + (format||'') + '">' +
      '<input class="form-control form-control-sm elem-position" placeholder="x,y" style="flex:0 0 70px" value="' + (position||'') + '">' +
      '<button class="btn btn-outline-danger btn-sm elem-remove flex-shrink-0" title="Remove">&times;</button>';
    row.querySelector('.elem-type').addEventListener('change', function(){
      var d = DEFAULTS[this.value];
      row.querySelector('.elem-format').value = d.format;
      row.querySelector('.elem-position').value = d.position;
    });
    row.querySelector('.elem-remove').addEventListener('click', function(){ row.remove(); });
    return row;
  }

  function collectElements() {
    var elems = {};
    document.querySelectorAll('#osd-elements-list .osd-el-row').forEach(function(row){
      var name = row.querySelector('.elem-name').value.trim();
      if (!name) return;
      elems[name] = {
        type: row.querySelector('.elem-type').value,
        format: row.querySelector('.elem-format').value,
        position: row.querySelector('.elem-position').value
      };
    });
    return elems;
  }

  function loadElements(elems) {
    var list = document.getElementById('osd-elements-list');
    list.innerHTML = '';
    if (!elems) return;
    Object.keys(elems).forEach(function(name){
      var el = elems[name];
      list.appendChild(createRow(name, el.type, el.format, el.position));
    });
  }

  function loadOsdConfig() {
    fetch(API, {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({osd:{enabled:null,elements:null}})})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.enabled !== undefined) document.getElementById('osd-enabled').checked = d.enabled !== false;
      loadElements(d.elements);
    }).catch(function(){});
  }

  // Restore visual settings
  function restoreVisuals(){
    var s = loadSettings();
    var svg = document.getElementById('sei-osd-overlay');
    if (!svg || !svg.querySelector('text')) { setTimeout(restoreVisuals, 200); return; }
    if (s.fs) { svg.dataset.fs = s.fs; }
    if (s.stw) svg.dataset.stw = s.stw;
    if (s.fs || s.stw) {
      var texts = svg.querySelectorAll('text');
      for (var i=0;i<texts.length;i++) {
        if (s.fs) texts[i].setAttribute('font-size', s.fs);
        if (s.stw) texts[i].setAttribute('stroke-width', s.stw);
      }
      if (window._seiRepaint) window._seiRepaint();
    }
  }
  restoreVisuals();

  document.getElementById('preview-osd').addEventListener('click', function(){
    loadOsdConfig();
    var s = loadSettings();
    document.getElementById('osd-fontsize').value = s.fs || 16;
    document.getElementById('osd-fontsize-val').textContent = s.fs || 16;
    document.getElementById('osd-stroke').value = s.stw || 1;
    document.getElementById('osd-stroke-val').textContent = s.stw || 1;
    new bootstrap.Modal('#osdModal').show();
  });

  document.getElementById('osd-add-element').addEventListener('click', function(){
    document.getElementById('osd-elements-list').appendChild(createRow('', 'text', '', ''));
  });

  document.getElementById('osd-fontsize').addEventListener('input', function(){
    document.getElementById('osd-fontsize-val').textContent = this.value;
  });
  document.getElementById('osd-stroke').addEventListener('input', function(){
    document.getElementById('osd-stroke-val').textContent = this.value;
  });

  document.getElementById('osd-save').addEventListener('click', async function(){
    var btn = document.getElementById('osd-save');
    var confirmed = await confirm('Save OSD elements to /etc/prudynt.json?');
    if (!confirmed) return;
    btn.disabled = true;
    try {
      var payload = { osd: { enabled: document.getElementById('osd-enabled').checked, elements: collectElements() }, action: { save_config: null } };
      var r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
      var msg = await r.json();
      if (msg.action && msg.action.save_config === 'ok') {
        if (typeof showAlert === 'function') showAlert('success', 'OSD configuration saved.', 4000);
        bootstrap.Modal.getInstance('#osdModal').hide();
      }
    } catch(e) {
      if (typeof showAlert === 'function') showAlert('danger', 'Failed: ' + e.message, 6000);
    } finally { btn.disabled = false; }

    // Save visual settings locally
    saveSettings({
      fs: document.getElementById('osd-fontsize').value,
      stw: document.getElementById('osd-stroke').value
    });
    var svg = document.getElementById('sei-osd-overlay');
    if (svg) {
      svg.dataset.fs = document.getElementById('osd-fontsize').value;
      svg.dataset.stw = document.getElementById('osd-stroke').value;
      var texts = svg.querySelectorAll('text');
      for (var i=0;i<texts.length;i++) {
        texts[i].setAttribute('font-size', svg.dataset.fs);
        texts[i].setAttribute('stroke-width', svg.dataset.stw);
      }
      if (window._seiRepaint) window._seiRepaint();
    }
  });
})();
</script>

</body>
