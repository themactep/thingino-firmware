<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>thingino · Gotify Configuration</title>
  <script src="/a/theme-init.js"></script>
  <link rel="icon" type="image/svg+xml" href="/a/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/a/main.css">
</head>

<body id="page-tool-send2-gotify">
<nav data-app-nav></nav>

<main class="pb-4">
  <div class="container" style="min-height:80vh">
    <div data-app-controls></div>

    <section>
      <div class="d-flex align-items-center gap-2 mb-3">
        <a href="tool-send2.html" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left"></i> Back to Services
        </a>
        <h2 class="mb-0">Gotify Configuration</h2>
      </div>

      <form id="gotifyForm" class="needs-validation" novalidate autocomplete="off">
        <div class="row row-cols-1 row-cols-md-2 g-4 mb-4">

          <div class="col">
            <div class="card h-100">
              <div class="card-header">Server Settings</div>
              <div class="card-body">
                <p>
                  <label for="gotify_url">Server URL</label>
                  <input type="url" class="form-control" id="gotify_url" name="gotify_url" placeholder="http://gotify.local" required>
                </p>
                <p>
                  <label for="gotify_token">Application Token</label>
                  <input type="text" class="form-control" id="gotify_token" name="gotify_token" required>
                </p>
                <p>
                  <label for="gotify_priority">Priority</label>
                  <input type="number" class="form-control" id="gotify_priority" name="gotify_priority" min="0" max="10" value="5">
                </p>
              </div>
            </div>
          </div>

          <div class="col">
            <div class="card h-100">
              <div class="card-header">Message Settings</div>
              <div class="card-body">
                <p>
                  <label for="gotify_title">Title</label>
                  <input type="text" class="form-control" id="gotify_title" name="gotify_title" placeholder="Thingino Camera">
                </p>
                <p>
                  <label for="gotify_message">Message Body</label>
                  <textarea class="form-control" id="gotify_message" name="gotify_message" rows="3" placeholder="Motion detected at %Y-%m-%d %H:%M:%S"></textarea>
                  <small class="form-text text-secondary">Supports strftime variables</small>
                </p>
                <p>
                  <label for="gotify_extras">Extras JSON</label>
                  <textarea class="form-control font-monospace" id="gotify_extras" name="gotify_extras" rows="5" placeholder='{"client::display":{"contentType":"text/plain"}}'></textarea>
                  <small class="form-text text-secondary">Optional JSON object sent as Gotify extras.</small>
                </p>
                <p class="form-switch">
                  <input type="checkbox" class="form-check-input" id="gotify_send_photo" name="gotify_send_photo" disabled>
                  <label class="form-check-label" for="gotify_send_photo">Send photo attachment</label>
                </p>
                <p class="form-switch">
                  <input type="checkbox" class="form-check-input" id="gotify_send_video" name="gotify_send_video" disabled>
                  <label class="form-check-label" for="gotify_send_video">Send video attachment</label>
                </p>
                <p class="mb-0 text-secondary small">Media attachments are disabled because current Gotify releases do not persist per-message uploads.</p>
              </div>
            </div>
          </div>
        </div>

        <div class="text-end">
          <button type="button" class="btn btn-outline-secondary" id="gotify-reload">
            <i class="bi bi-arrow-clockwise"></i> Reload
          </button>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-circle"></i> Save Settings
          </button>
        </div>
      </form>
    </section>
  </div>
</main>

<footer data-app-footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="/a/main.js"></script>
<script src="/a/navigation.js"></script>
<script src="/a/footer.js"></script>
<script src="/a/control-bar.js"></script>
<script src="/a/tool-send2-gotify.js"></script>
</body>
</html>
