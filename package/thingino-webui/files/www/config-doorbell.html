<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>thingino · Doorbell Chime</title>
  <script src="/a/theme-init.js"></script>
  <link rel="icon" type="image/svg+xml" href="/a/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/a/main.css">
</head>

<body id="page-config-doorbell">
<nav data-app-nav></nav>

<main class="pb-4">
  <div class="container" style="min-height:80vh">
    <div data-app-controls></div>

    <div id="doorbell-msg" class="alert" hidden></div>

    <section>
      <!-- ── Pairing ────────────────────────────────────────── -->
      <div class="card mb-3">
        <div class="card-header">
          <h2 class="card-title">Pair New Chime</h2>
          <small>Put the chime in pairing mode (unplug, replug, hold button until slow blue flash), then enter a name and click Pair.</small>
        </div>
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-3">
              <label class="form-label" for="pair-name">Chime name</label>
              <input class="form-control" id="pair-name" placeholder="e.g. living_room">
            </div>
            <div class="col-md-2">
              <button class="btn btn-primary" id="pair-btn"><i class="bi bi-plug me-1"></i> Pair</button>
            </div>
            <div class="col">
              <button class="btn btn-outline-secondary" id="reload-btn"><i class="bi bi-arrow-clockwise"></i> Reload</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Paired Chimes ──────────────────────────────────── -->
      <div class="card mb-3">
        <div class="card-header"><h2 class="card-title">Paired Chimes</h2></div>
        <div class="card-body p-0">
          <table class="table table-striped mb-0">
            <thead><tr><th>Name</th><th>MAC</th><th>ID</th><th class="text-end">Actions</th></tr></thead>
            <tbody id="units-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- ── Groups ─────────────────────────────────────────── -->
      <div class="card mb-3">
        <div class="card-header"><h2 class="card-title">Groups</h2></div>
        <div class="card-body p-0">
          <table class="table table-striped mb-0">
            <thead><tr><th>Group</th><th>Members</th><th class="text-end">Actions</th></tr></thead>
            <tbody id="groups-tbody"></tbody>
          </table>
        </div>
        <div class="card-body" id="group-edit-area"></div>
      </div>

      <!-- ── Events ─────────────────────────────────────────── -->
      <div class="card mb-3">
        <div class="card-header"><h2 class="card-title">Events</h2></div>
        <div class="card-body p-0">
          <table class="table table-striped mb-0">
            <thead><tr><th>Event</th><th>Sound</th><th>Vol</th><th>Rep</th><th class="text-end">Actions</th></tr></thead>
            <tbody id="events-tbody"></tbody>
          </table>
        </div>
        <div class="card-body" id="event-edit-area"></div>
      </div>

      <!-- ── Test ───────────────────────────────────────────── -->
      <div class="card mb-3">
        <div class="card-header"><h2 class="card-title">Test Chime</h2></div>
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-3">
              <label class="form-label" for="test-sound">Sound</label>
              <select class="form-select" id="test-sound">
                <option value="DOORBELL_1">DOORBELL_1</option>
                <option value="DOORBELL_2">DOORBELL_2</option>
                <option value="DOORBELL_3">DOORBELL_3</option>
                <option value="DOORBELL_4">DOORBELL_4</option>
                <option value="SPACE_WAVE">SPACE_WAVE</option>
                <option value="WIND_CHIME">WIND_CHIME</option>
                <option value="CURIOSITY">CURIOSITY</option>
                <option value="SURPRISE">SURPRISE</option>
                <option value="CHEERFUL">CHEERFUL</option>
                <option value="BIRD_CHIRP">BIRD_CHIRP</option>
                <option value="DOG_BARK_1">DOG_BARK_1</option>
                <option value="DOG_BARK_2">DOG_BARK_2</option>
                <option value="DOOR_CLOSE">DOOR_CLOSE</option>
                <option value="DOOR_OPEN">DOOR_OPEN</option>
                <option value="SIMPLE_1">SIMPLE_1</option>
                <option value="SIMPLE_2">SIMPLE_2</option>
                <option value="SIMPLE_3">SIMPLE_3</option>
                <option value="SIMPLE_4">SIMPLE_4</option>
                <option value="INTRUDER">INTRUDER</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label" for="test-volume">Volume (1–32)</label>
              <input class="form-control" id="test-volume" type="number" min="1" max="32" value="5">
            </div>
            <div class="col-md-2">
              <label class="form-label" for="test-repeat">Repeat</label>
              <input class="form-control" id="test-repeat" type="number" min="1" max="255" value="1">
            </div>
            <div class="col">
              <button class="btn btn-outline-primary" id="play-all-btn"><i class="bi bi-play-fill me-1"></i> Play All</button>
            </div>
          </div>
        </div>
      </div>

    </section>
  </div>
</main>

<footer data-app-footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="/a/main.js"></script>
<script src="/a/runtime-config.js"></script>
<script src="/a/control-bar.js"></script>
<script src="/a/navigation.js"></script>
<script src="/a/footer.js"></script>
<script src="/a/config-doorbell.js"></script>
</body>
</html>
