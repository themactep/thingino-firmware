# Raptor configuration (raptor.conf)
# Each setting maps to a raptor.conf key.
# String settings: leave empty to use code default.
# Bool settings: "default" leaves the line commented (code default).

menu "Raptor configuration (raptor.conf)"
depends on BR2_PACKAGE_THINGINO_RAPTOR

