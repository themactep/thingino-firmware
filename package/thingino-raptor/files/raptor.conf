# Raptor Streaming System configuration
# See raptor-docs for full option reference

[sensor]
# All values auto-detected from /proc/jz/sensor if omitted
# name = gc4653
# i2c_addr = 0x29
# i2c_adapter = 0
# fps = 0

[stream0]
width = 1920
height = 1080
fps = 25
codec = h264
profile = 2
bitrate = 2000000
rc_mode = vbr
gop = 50
min_qp = 15
max_qp = 45
nr_vbs = 2

[stream1]
enabled = true
width = 640
height = 360
fps = 25
codec = h264
profile = 0
bitrate = 500000
rc_mode = cbr
gop = 50
nr_vbs = 2

[jpeg]
enabled = true
quality = 75
fps = 1
bufshare = true
# jpeg0_enabled = true
# jpeg1_enabled = true

[ring]
main_slots = 32
main_data_mb = 4
sub_slots = 32
sub_data_mb = 1

[audio]
enabled = true
sample_rate = 16000
codec = l16               # pcmu, pcma, l16, aac, opus
# bitrate = 32000         # for aac/opus (bits per second, max 256000)
volume = 80
gain = 25
# Audio output (speaker / backchannel)
# ao_enabled = false
# ao_volume = 80
# ao_gain = 25
# Audio effects (requires libaudioProcess.so)
# ns_enabled = true       # noise suppression
# ns_level = moderate      # low, moderate, high, veryhigh
# hpf_enabled = true       # high-pass filter (removes DC offset / low rumble)
# agc_enabled = true       # automatic gain control
# agc_target_dbfs = 10     # target level (0-31 dBfs)
# agc_compression_db = 0   # compression gain (0-90 dB)

[rtsp]
port = 554
max_clients = 4
# username = admin
# password = secret

[http]
port = 8080
# username = admin
# password = secret

[osd]
enabled = true
font = /usr/share/fonts/default.ttf
font_size = 24
font_color = 0xFFFFFFFF
font_stroke = 1
time_enabled = true
time_format = %Y-%m-%d %H:%M:%S
uptime_enabled = true
text_enabled = true
text_string = Camera
logo_enabled = true
privacy_color = 0xFF000000
logo_path = /usr/share/images/thingino_100x30.bgra
logo_width = 100
logo_height = 30
# Per-stream positions: top_left, top_center, top_right,
#   bottom_left, bottom_center, bottom_right, center, or x,y coords
# stream0_font_size = 24
stream0_time_pos = top_left
stream0_uptime_pos = top_right
stream0_text_pos = top_center
stream0_logo_pos = bottom_right
# stream1_font_size = 12
stream1_time_pos = top_left
stream1_uptime_pos = top_right
stream1_text_pos = top_center
stream1_logo_pos = bottom_right

[ircut]
enabled = true
mode = auto
day_threshold = 25000
night_threshold = 40000
hysteresis_sec = 5
poll_interval_ms = 1000
gpio_ircut = -1
gpio_ircut2 = -1
gpio_irled = -1

[recording]
enabled = false
stream = 0
audio = true
segment_minutes = 5
storage_path = /mnt/mmcblk0p1/raptor
max_storage_mb = 0
write_buffer_kb = 1024

[log]
level = info
target = syslog
