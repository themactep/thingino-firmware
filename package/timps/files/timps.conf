# timps configuration (plain key = value)
# See https://github.com/Lu-Fi/timps for full documentation.

# ---- general ----
general.loglevel            = 2      # 0=err 1=warn 2=info 3=debug
general.syslog              = 1      # also log to syslog
general.imp_polling_timeout = 500    # ms, encoder poll timeout
general.osd_pool_size       = 1000   # KB, IMP OSD pool

# ---- sensor ----
# model/i2c_addr are always overridden by the loaded kernel sensor driver
# (/proc/jz/sensor/sensor0) when present - the values below are only a
# fallback for the rare case that registry is unreadable, so it's safe to
# leave them as-is on any board.
sensor.model    = gc2053
sensor.i2c_addr = 0x37
# fps/width/height are config-first: an explicit value here always wins over
# the sensor, even if it's wrong for this board. Leave commented so the
# daemon self-detects from /proc/jz/sensor (falling back to the encoder's
# video0 settings, then 1920x1080@25) instead of forcing every board to this
# board's resolution. Only set these if auto-detection fails for your sensor.
# sensor.fps      = 25
# sensor.width    = 1920
# sensor.height   = 1080

# ---- image / ISP tuning (0..255; 128 = neutral) ----
image.brightness             = 128
image.contrast               = 128
image.saturation             = 128
image.sharpness              = 128
image.hue                    = 128
image.hflip                  = 0
image.vflip                  = 0
image.anti_flicker           = 2     # 0 off, 1 = 50Hz, 2 = 60Hz
image.running_mode           = 0     # 0 day, 1 night
image.ae_compensation        = 128
image.max_again              = 160
image.max_dgain              = 80
image.sinter_strength        = 128
image.temper_strength        = 128
image.dpc_strength           = 128
image.defog_strength         = 128
image.drc_strength           = 128
image.highlight_depress      = 0
image.backlight_compensation = 0
image.core_wb_mode           = 0     # 0 auto
image.wb_rgain               = 0
image.wb_bgain               = 0

# ---- RTSP server (video + audio) ----
rtsp.enabled = 1
rtsp.port    = 554
rtsp.user    =
rtsp.pass    =

# ---- HTTP preview (fMP4 + JPEG/MJPEG) ----
http.enabled     = 1
http.port        = 8880
http.preview_chn = 1
http.user        =
http.pass        =
http.token       =
http.token_file  = /run/timps.token

# ---- optional TLS: HTTPS + RTSPS (USE_TLS builds, mbedTLS) ----
# http.https    = 1                       # serve the HTTP port over TLS
http.tls_cert   = /etc/ssl/certs/httpd.crt
http.tls_key    = /etc/ssl/private/httpd.key
# rtsp.tls      = 1                       # additionally run an RTSPS listener
# rtsp.tls_port = 322                     # RTSPS port

# ---- SRT output (USE_SRT builds, libsrt) ----
srt.enabled    = 1
srt.port       = 9000

# ---- recording ----
record.enabled  = 0
# record.dir    = /mnt/mmcblk0p1

# ---- motion detection ----
# Native IMP_IVS motion; grid/sensitivity are set in the WebUI. on_motion runs a
# command on each event: the timps->send2 bridge captures a snapshot + on-demand
# clip and fires the "Send to" services enabled for motion (per-service toggles
# live in /etc/prudynt.json, written by the stock WebUI "Send to" page).
motion.on_motion = /usr/sbin/timps-motion
