name: Teacup Quick Test

on:
  push:
    branches:
      - stable
  workflow_dispatch:

env:
  BR2_DL_DIR: ~/dl
  FORCE_UNSAFE_CONFIGURE: 1
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TERM: linux

jobs:
  build-teacup:
    # ubuntu-26.04-arm to match stable's build runner + ccache assets (ccache-stable-ARM64-*); the dl-cache is arch-agnostic
    runs-on: ubuntu-26.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: "stable"
          fetch-depth: 0

      - name: Wait for cooldown (10 minutes)
        run: sleep 600

      - name: Check for new commits after cooldown
        id: check-latest
        run: |
          git fetch origin stable
          LATEST_SHA=$(git rev-parse origin/stable)
          if [[ "$LATEST_SHA" != "$GITHUB_SHA" ]]; then
            echo "Newer commit detected ($LATEST_SHA), skipping this run."
            exit 78
          fi

      - name: Setup cache directories
        run: |
          mkdir -p ~/.buildroot-ccache
          mkdir -p ~/dl

      - name: Restore ccache from release
        run: |
          REPO="${{ github.repository }}"
          CACHE_ARCH=${{ runner.arch }}
          CAM_SAFE=teacup_t31x
          mkdir -p /tmp/cc
          # Restore stable's cache for this board; fall back to master for a warm start.
          restored=""
          for CH in stable master; do
            ASSET="ccache-${CH}-${CACHE_ARCH}-${CAM_SAFE}.zip"
            if gh release download ccache --repo "$REPO" --pattern "$ASSET" --dir /tmp/cc 2>/dev/null; then
              echo "Restoring $ASSET ($(du -h "/tmp/cc/$ASSET" 2>/dev/null | cut -f1))"
              ( cd ~ && 7z x -y "/tmp/cc/$ASSET" >/dev/null ) || echo "  7z rc=$? during restore (non-fatal)"
              restored="$ASSET"
              break
            fi
          done
          [ -n "$restored" ] && echo "ccache: $(du -sh ~/.buildroot-ccache 2>/dev/null | cut -f1)" || echo "No ccache asset yet — cold build"
          exit 0   # ccache restore is best-effort — never fail the test on it

      - name: Fetch buildroot-dl-cache release
        id: find_release
        run: |
          REPO="${{ github.repository }}"
          # Prefer the release named "buildroot-dl-cache"; fall back to any "update_cache*" tag.
          RELEASE_TAG=$(gh release list --repo "$REPO" --json name,tagName | jq -r '.[] | select(.name=="buildroot-dl-cache") | .tagName' | sort -r | head -1 || echo "")
          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG=$(gh release list --repo "$REPO" --json tagName | jq -r '.[] | select(.tagName | startswith("update_cache")) | .tagName' | head -n 1 || echo "")
          fi
          if [ -n "$RELEASE_TAG" ]; then
            echo "Found dl-cache release: $RELEASE_TAG"
            echo "release_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT
            echo "release_found=true" >> $GITHUB_OUTPUT
          else
            echo "No dl-cache release found; continuing without it"
            echo "release_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Download buildroot-dl-cache files
        id: download_cache
        if: steps.find_release.outputs.release_found == 'true'
        run: |
          REPO="${{ github.repository }}"
          RELEASE_TAG="${{ steps.find_release.outputs.release_tag }}"
          mkdir -p /tmp/dl-cache
          set +e
          gh release download "$RELEASE_TAG" --repo "$REPO" --pattern "buildroot-dl-cache*" --dir "/tmp/dl-cache"
          RC=$?
          set -e
          if [ $RC -ne 0 ] || [ ! "$(ls -A /tmp/dl-cache/ 2>/dev/null)" ]; then
            echo "dl-cache download failed/empty; continuing without it"
            echo "download_succeeded=false" >> $GITHUB_OUTPUT
          else
            echo "dl-cache downloaded: $(ls -1 /tmp/dl-cache | wc -l) part(s)"
            echo "download_succeeded=true" >> $GITHUB_OUTPUT
          fi

      - name: Extract buildroot-dl-cache
        if: steps.download_cache.outputs.download_succeeded == 'true'
        run: |
          cd ~
          # Split ZIP (-v384m) extracts from the first volume; single ZIP extracts directly.
          if ls /tmp/dl-cache/buildroot-dl-cache.zip.* &>/dev/null; then
            7z x /tmp/dl-cache/buildroot-dl-cache.zip.001 -y >/dev/null || echo "  7z rc=$? (non-fatal, build will re-download)"
          else
            7z x /tmp/dl-cache/buildroot-dl-cache.zip -y >/dev/null || echo "  7z rc=$? (non-fatal, build will re-download)"
          fi
          # Archive stores a top-level dl/ dir; flatten it into ~/dl.
          if [ -d ~/dl/dl ]; then
            mv ~/dl/dl/* ~/dl/ 2>/dev/null && rm -rf ~/dl/dl
          fi
          echo "dl cache restored: $(find ~/dl -type f 2>/dev/null | wc -l) files"
          exit 0   # dl-cache is best-effort — never fail the test on it

      - name: Build Tea Cup profile only
        # No ccache save on this workflow — it is a quick smoke test, not a cache producer.
        run: |
          BOARD=teacup_t31x make fast WORKFLOW=1
