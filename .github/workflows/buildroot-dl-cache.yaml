name: buildroot-dl-cache
on:
  schedule:
    # 22:00 PST / Sunday
    - cron:  '00 06 * * 0'
  workflow_dispatch:
    inputs:
      branch:
        type: choice
        description: 'Branch to build cache from'
        required: false
        default: 'master'
        options:
          - master
          - stable
      tg_disabled:
        type: boolean
        description: 'Disable Telegram notifications'
        required: false
        default: false
      tg_scratch:
        type: boolean
        description: 'Use TG scratch channel'
        required: false
        default: false

env:
  BR2_DL_DIR: ~/dl
  FORCE_UNSAFE_CONFIGURE: 1
  TAG_NAME: update_cache
  TERM: linux
  TG_TOKEN: ${{secrets.TELEGRAM_TOKEN_BOT_THINGINO}}
  TG_CHANNEL: ${{secrets.TELEGRAM_CHANNEL_THINGINO_MULTI}}
  TG_TOPIC: ${{secrets.TELEGRAM_CHANNEL_THINGINO_MULTI_TOPIC_FIRMWARE}}
  TG_CHANNEL_SCRATCH: ${{secrets.TELEGRAM_CHANNEL_THINGINO_SCRATCH}}
  TZ: UTC

jobs:
  notify-begin:
    runs-on: ubuntu-24.04
    outputs:
      start_time: ${{ steps.set_output.outputs.time }}
      tg_disabled: ${{ steps.set_env.outputs.tg_disabled }}
    steps:
      - name: Set timezone
        run: |
          sudo timedatectl set-timezone ${{ env.TZ }}

      - name: Save workflow start time to ENV
        id: set_output
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Configure Environment Variables
        id: set_env
        run: |
          echo "TG_DISABLED=${{ github.event.inputs.tg_disabled || 'false' }}" >> $GITHUB_ENV
          echo "tg_disabled=${{ github.event.inputs.tg_disabled || 'false' }}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch || 'master' }}
          fetch-depth: "1"

      - name: Send build start notifcation via Telegram
        if: env.TG_DISABLED == 'false'
        run: |
          if [[ "${{ github.event.inputs.tg_scratch }}" == 'true' ]]; then
            TG_CHANNEL=${{ env.TG_CHANNEL_SCRATCH }}
            export TG_TOPIC=""
          fi
          .github/scripts/tg-notify.sh -s $TG_TOKEN $TG_CHANNEL $TG_TOPIC start ${{ github.workflow }} ${{ github.run_id }} ${{ github.repository }}

  build-caches:
    name: ${{ matrix.caches-version }}
    needs: notify-begin
    # arm64: firmware builds now default to arm64, so the cache must hold the aarch64 toolchain
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    container:
      image: debian:trixie
    strategy:
      fail-fast: false
      matrix:
        caches-version:
          - build_cache

    steps:
      - name: Install GitHub CLI to container
        run: |
          apt-get update
          apt-get install -y curl
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null

      - name: Update package manager sources
        run: |
          apt-get update

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends --no-install-suggests build-essential bc ccache cmake cpio curl ca-certificates file git gh make gawk procps rsync u-boot-tools unzip wget p7zip-full

      - name: Set timezone
        run: |
          ln -sf /usr/share/zoneinfo/${{ env.TZ }} /etc/localtime
          echo ${{ env.TZ }} > /etc/timezone
          DEBIAN_FRONTEND=noninteractive dpkg-reconfigure -f noninteractive tzdata

      - name: Setup gh workspace to container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout repository source
        uses: actions/checkout@v5
        with:
          submodules: 'true'
          ref: ${{ github.event.inputs.branch || 'master' }}
          fetch-depth: "1"

      - name: Configure environment variables
        id: env
        run: |
          echo "WEEK_NUMBER=$(date +%U)" >> $GITHUB_ENV
          echo "CURRENT_YEAR=$(date +%Y)" >> $GITHUB_ENV
          echo "GIT_HASH=$(git rev-parse --short ${GITHUB_SHA})" >> $GITHUB_ENV
          echo "GIT_BRANCH=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "TG_DISABLED=${{ github.event.inputs.tg_disabled || 'false' }}" >> $GITHUB_ENV
          DATE_TAG=$(date +'%Y-%m-%d')
          echo "DATE_TAG=$DATE_TAG" >> $GITHUB_ENV
          # Rolling cache: always publish to the fixed 'update_cache' tag (no date suffix)
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

          echo "GIT_HASH=$(git rev-parse --short ${GITHUB_SHA})" >> $GITHUB_OUTPUT
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Setup cache directories
        run: |
          mkdir -p ~/.buildroot-ccache
          mkdir -p ~/dl

      - name: Download buildroot sources (all cache variants)
        run: |
          # One shared ~/dl. build_cache pulls every package + all wifi (xburst1 toolchain);
          # the variant configs add the other toolchain tags + their kernel/u-boot.
          for cfg in build_cache build_cache_xburst1_44 build_cache_xburst2; do
            echo "::group::make source — $cfg"
            BOARD=$cfg GROUP=github make source WORKFLOW=1
            # `make source` does not fetch the external toolchain tarball; pull it explicitly
            BOARD=$cfg GROUP=github make br-toolchain-external-custom-source WORKFLOW=1 || echo "toolchain-source skipped for $cfg"
            echo "::endgroup::"
          done
          TIME=$(date -d @${SECONDS} +%M:%S)
          echo "TIME=${TIME}" >> ${GITHUB_ENV}

      - name: Prune Buildroot DL cache
        run: |
          find ~/dl/ -type d -name git -exec rm -rf {} +

      - name: Compress DL directory with ZIP (store mode)
        run: |
          mkdir -p /tmp/dl-archive
          cd ~/
          # ZIP store mode (no compression) for speed. Small -v parts (~384M): 'gh release download'
          # fetches the release assets in parallel, so many small parts saturate bandwidth while big
          # 1GB parts hit GitHub's per-asset throttle. Measured: gh + 7x384M ~= 7s vs 25s with 3x1GB.
          7z a -tzip -mx=0 -v384m /tmp/dl-archive/buildroot-dl-cache.zip dl/

      - name: Check archive files
        run: |
          ls -la /tmp/dl-archive/
          echo "Archive created with the following parts:"
          ls -lh /tmp/dl-archive/buildroot-dl-cache*.zip*

      - name: Publish rolling buildroot-dl-cache release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG=update_cache
          BODY="Rolling buildroot download cache. Last updated ${DATE_TAG} (${GIT_HASH})."
          # Create the rolling release once; refresh its notes on later runs. Never mark it 'latest'.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "buildroot-dl-cache" --notes "$BODY" --latest=false
          else
            gh release create "$TAG" --title "buildroot-dl-cache" --notes "$BODY" --latest=false
          fi
          # Upload this run's archive parts, overwriting any same-named parts in place.
          gh release upload "$TAG" --clobber /tmp/dl-archive/buildroot-dl-cache*.zip*
          # Drop orphaned parts left by a previous, larger split so the published set matches this run.
          produced="$(cd /tmp/dl-archive && ls buildroot-dl-cache*.zip*)"
          gh release view "$TAG" --json assets --jq '.assets[].name' | while read -r name; do
            if ! grep -qxF "$name" <<<"$produced"; then
              echo "Deleting stale asset: $name"
              gh release delete-asset "$TAG" "$name" --yes
            fi
          done

      - name: Send error notification
        if: ${{ env.TG_DISABLED == 'false' && failure() }}
        run: |
          if [[ "${{ github.event.inputs.tg_scratch }}" == 'true' ]]; then
            TG_CHANNEL=${{ env.TG_CHANNEL_SCRATCH }}
            export TG_TOPIC=""
          fi
          .github/scripts/tg-notify.sh -s $TG_TOKEN $TG_CHANNEL $TG_TOPIC error $TAG_NAME ${{ github.run_id }} buildroot-dl-cache ${{ github.repository }}

  notify-completion:
    needs: [build-caches, notify-begin]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Set timezone
        run: |
          sudo timedatectl set-timezone ${{ env.TZ }}

      - name: Configure Environment
        run: |
          echo "TG_DISABLED=${{ github.event.inputs.tg_disabled || 'false' }}" >> $GITHUB_ENV
          echo "GIT_HASH=${{ needs.build-caches.outputs.git_hash }}" >> $GITHUB_ENV
          echo "TAG_NAME=${{ needs.build-caches.outputs.tag_name }}" >> $GITHUB_ENV

      - name: Checkout repository source
        uses: actions/checkout@v5
        with:
          submodules: 'false'
          ref: ${{ github.event.inputs.branch || 'master' }}

      - name: Send notify completion summary
        if: ${{ env.TG_DISABLED == 'false' }}
        run: |
          if [[ "${{ github.event.inputs.tg_scratch }}" == 'true' ]]; then
            TG_CHANNEL=${{ env.TG_CHANNEL_SCRATCH }}
            export TG_TOPIC=""
          fi
          START_TIME=${{ needs.notify-begin.outputs.start_time }}
          END_TIME=$(date -u +%s)
          ELAPSED=$((END_TIME - START_TIME))
          ELAPSED_MIN=$((ELAPSED / 60))
          ELAPSED_SEC=$((ELAPSED % 60))
          .github/scripts/tg-notify.sh -s $TG_TOKEN $TG_CHANNEL $TG_TOPIC finish ${{ github.workflow }} "${ELAPSED_MIN}m ${ELAPSED_SEC}s" ${{ github.run_id }} ${{ github.repository }}
