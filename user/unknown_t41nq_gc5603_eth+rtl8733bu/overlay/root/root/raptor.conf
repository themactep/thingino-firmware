# Raptor Streaming System configuration
# See raptor-docs/23-rss-config.md for full option reference

[sensor]
name = gc5603
i2c_addr = 0x31
# i2c_adapter = 0
fps = 30
# GPIO pins (default -1 = disabled):
rst_gpio = 18
pwdn_gpio = -1
# power_gpio = -1             # sensor power GPIO
# T40/T41 only:
# boot = 0                    # sensor boot mode (0=linear, 1=WDR, 2=60fps crop)
mclk = 1
video_interface = 0
antiflicker = 1               # 0=off, 1=50Hz, 2=60Hz (match your power grid frequency)
low_latency = false           # encoder immediate output for all streams (saves ~100ms)
width = 2880
height = 1620

[stream0]
width = 2880
height = 1620
fps = 30
# codec = h264
# profile = 2
bitrate = 3000000
# max_bitrate = 0             # 0 = auto (4/3 of target for capped modes)
# rc_mode = cbr               # cbr/vbr/capped_vbr/capped_quality/fixqp/smart
# gop = 30
# init_qp = -1                # initial QP (-1 = SDK default; required for fixqp, range 0-51)
# min_qp = -1                 # -1 = SDK default
# max_qp = -1                 # -1 = SDK default
# ip_delta = -1               # QP delta I vs P frames (-1 = SDK default, T31+)
# pb_delta = -1               # QP delta P vs B frames (-1 = SDK default, T31+)
# max_psnr = 0                # PSNR quality cap for capped modes (0 = SDK default, T31+)
# nr_vbs = 2
# ivdc = true                 # ISP-VPU Direct Connect (T23+ only, reduces rmem)
osd_enabled = false           # per-stream OSD (default true)
# jpeg = true                 # per-stream JPEG snapshot (default true)
# jpeg_quality = 75           # override [jpeg] quality
# jpeg_fps = 1                # override [jpeg] fps

[stream1]
enabled = true
width = 1280
height = 720
fps = 30
# codec = h264
# profile = 2
bitrate = 768000
# max_bitrate = 0             # 0 = auto (4/3 of target for capped modes)
# rc_mode = cbr               # cbr/vbr/capped_vbr/capped_quality/fixqp/smart
# gop = 30
# init_qp = -1                # initial QP (-1 = SDK default; required for fixqp, range 0-51)
# min_qp = -1                 # -1 = SDK default
# max_qp = -1                 # -1 = SDK default
# ip_delta = -1               # QP delta I vs P frames (-1 = SDK default, T31+)
# pb_delta = -1               # QP delta P vs B frames (-1 = SDK default, T31+)
# max_psnr = 0                # PSNR quality cap for capped modes (0 = SDK default, T31+)
# nr_vbs = 2
osd_enabled = false           # per-stream OSD (default true)
# jpeg = true                 # per-stream JPEG snapshot (default true)
# jpeg_quality = 75           # override [jpeg] quality
# jpeg_fps = 1                # override [jpeg] fps


[image]
# brightness = 128             # 0-255
# contrast = 128               # 0-255
# saturation = 128             # 0-255
# sharpness = 128              # 0-255
# hue = 128                    # 0-255
# sinter = 128                 # spatial noise reduction (0-255, T20-T31 only)
# temper = 128                 # temporal noise reduction (0-255, T20-T31 only)
# ae_comp = 128                # AE compensation (0-255)
# max_again = 160              # max analog gain (0-160, higher = more noise in low light)
# max_dgain = 80               # max digital gain (0-160)
# dpc_strength = 128           # dead pixel correction (0-255, T23/T31 only)
# drc_strength = 128           # dynamic range compression (0-255, T21/T23/T31 only)
# defog_strength = 128         # defog / dehaze (0-255, T23/T31 only)
# highlight_depress = 0        # highlight depression (0-255, T20-T31 only)
# backlight_comp = 0           # backlight compensation (0-10, T23/T31 only)
# hflip = 0                    # horizontal flip (0 or 1)
# vflip = 0                    # vertical flip (0 or 1)

[jpeg]
# enabled = true
# quality = 75
# fps = 1
# bufshare = false              # incompatible with rmem refmode (T31/T40/T41)
# idle = true                   # stop JPEG encoder when no viewers (saves CPU/VPU)
# Per-stream: set jpeg = false, jpeg_quality, jpeg_fps in [streamN] sections

[ring]
refmode = true
# main_slots = 32
# main_data_mb = 0            # 0 = auto-size from bitrate (recommended)
# sub_slots = 32
# sub_data_mb = 0             # 0 = auto-size from bitrate

[audio]
# enabled = true
# input = amic                # amic (analog mic) or dmic (digital mic array)
# sample_rate = 16000
codec = aac
# opus_complexity = 0         # 0-10 (lower = less CPU, default 5)
# bitrate = 128000            # for aac/opus (bits per second)
volume = 92
gain = 32
# device = 1                  # audio input device number
# DMIC options (input = dmic only, T30/T31/T32/T33/T40/T41):
# dmic_count = 1              # number of digital mics (1/2/4)
# dmic_aec_id = 0             # which mic for AEC processing (0-3)
# Audio output (speaker / backchannel)
ao_enabled = true
# ao_volume = 80
# ao_gain = 25
# Audio effects (requires libaudioProcess.so)
aec_enabled = false         # acoustic echo cancellation (requires ao_enabled)
# aec_profile_path = /etc     # directory containing webrtc_profile.ini
ns_enabled = true           # noise suppression
ns_level = 1               # 0=low, 1=moderate, 2=high, 3=veryhigh
hpf_enabled = true          # high-pass filter (removes DC offset / low rumble)
agc_enabled = true          # automatic gain control
# agc_target_dbfs = 10        # target level (0-31 dBfs)
# agc_compression_db = 0      # compression gain (0-90 dB)

[rtsp]
# enabled = true
# port = 554
max_clients = 4
endpoint_main = ch0
endpoint_sub = ch1
# jpeg = false                       # expose JPEG rings as MJPEG RTSP streams
# endpoint_jpeg = mjpeg              # JPEG main      (default: /jpeg)
# endpoint_jpeg_sub = mjpeg_sub      # JPEG sub       (default: /jpeg_sub)
username = thingino
password = thingino
# tls = false                 # enable RTSPS (default port changes to 322)
# tls_cert = /etc/ssl/certs/uhttpd.crt
# tls_key = /etc/ssl/private/uhttpd.key
# tls_cipher_preference = default   # default | chacha20
#   default  - mbedtls built-in cipher order (GCM-first in TLS 1.3).
#              Best on servers with HW AES+GHASH (x86 AES-NI, ARMv8-crypto).
#   chacha20 - force TLS 1.3 to ChaCha20-Poly1305 only; TLS 1.2 falls back
#              to the CBC/CCM/GCM order. Best on slow MIPS SoCs where every
#              AES-GCM TLS record costs an ioctl to the /dev/aes engine;
#              scalar userspace ChaCha20 beats HW AES on Ingenic T-series.
# session_name = Raptor Live  # SDP session name (s=)
# session_info =              # SDP session description (i=)
# session_timeout = 60        # RTSP session timeout in seconds (min 10)
# tcp_sndbuf = 65536          # TCP send buffer bytes (lower = less latency)
backchannel = true

[http]
# enabled = true
port = 8443
max_clients = 4
username = thingino
password = thingino
https = true
# cert = /etc/ssl/certs/uhttpd.crt
# key = /etc/ssl/private/uhttpd.key

[osd]
enabled = false
# Use ISP OSD instead of IPU OSD (T23/T32/T40/T41 only).
# ISP OSD works with IVDC and has zero DDR bandwidth overhead.
# IPU OSD is the default and works on all platforms.
# isp_osd = false
# font = /usr/share/fonts/default.ttf
# font_size = 24                # global default font size
# font_color = 0xFFFFFFFF       # global default text color (BGRA)
# font_stroke = 1               # global default stroke width (0-5)
# stroke_color = 0xFF000000     # global default stroke color (BGRA)
# time_format = %Y-%m-%d %H:%M:%S
# privacy_color = 0xFF000000

# -- OSD elements --
# Each [osd.<name>] section defines an OSD element.
# Elements can also be added/removed at runtime via raptorctl.
#
# Common keys:
#   type       = text | image | overlay
#   position   = top_left | top_center | top_right | bottom_left |
#                bottom_center | bottom_right | center | x,y
#   visible    = true | false
#   sub_only   = true | false          (render on sub-stream only)
#
# Text element keys:
#   template   = string with %var% expansion (%time%, %uptime%, %hostname%)
#   align      = left | center | right
#   max_chars  = 20                    (SHM width sizing, max 128)
#   update     = tick | change         (tick = every second, change = on template change)
#   font_size  = 0                     (0 = use global)
#   color      = 0xFFFFFFFF            (0 = use global, BGRA)
#   stroke_color = 0xFF000000          (0 = use global, BGRA)
#   stroke_size = -1                   (-1 = use global)
#
# Image element keys:
#   path       = /path/to/file.bgra
#   width      = pixels
#   height     = pixels

[ircut]
trigger = adc
adc_channel = 0
adc_night = 7500
adc_day = 9500
enabled = true
# mode = day
# trigger = gain
# night_luma = 20             # ae_luma below this -> night (0-255)
# night_gain = 80000          # total_gain above this -> night (regardless of luma)
# day_gain_pct = 25           # night->day: gain below this % of night baseline
# adc_channel = 0             # ADC channel for photoresistor (trigger=adc)
# adc_night = 200             # ADC below this -> night (trigger=adc)
# adc_day = 600               # ADC above this -> day (trigger=adc)
# photo_ev_night = 50000      # EV above this -> dark (trigger=photo, high ev=dark)
# photo_ev_deep = 150000      # EV above this -> very dark (trigger=photo)
# photo_ev_day = 5000         # EV below this -> bright (trigger=photo)
# photo_rgain_rec = 0         # R-gain AWB baseline (0=auto-calibrate from sensor)
# photo_bgain_rec = 0         # B-gain AWB baseline (0=auto-calibrate from sensor)
# night_threshold = 490000
# day_threshold = 390000
hysteresis_sec = 30           # consecutive seconds before switching
poll_interval_ms = 1500
gpio_ircut = 49               # -1 = auto from /etc/thingino.json
gpio_ircut2 = 50
gpio_irled = 81               # ir850 pin, -1 = auto from /etc/thingino.json
# gpio_irled2 = -1            # ir940 pin, -1 = auto from /etc/thingino.json
ir850 = true                  # enable 850nm IR LED (visible glow, stronger)
# ir940 = false               # enable 940nm IR LED (invisible, weaker)

[recording]
# enabled = false
# mode = continuous           # continuous, motion, or both
# stream = 0
# audio = true
# segment_minutes = 5
# storage_path = /mnt/mmcblk0p1/raptor
# max_storage_mb = 0
# prebuffer_sec = 5           # seconds of pre-event footage in motion clips (0-5)
# clip_length_sec = 60        # motion clip max duration before rotation
# clip_max_mb = 100           # max total clip storage

[webrtc]
enabled = true
# udp_port = 8443
# http_port = 8554
# max_clients = 2
cert = /etc/ssl/certs/uhttpd.crt
key = /etc/ssl/private/uhttpd.key
# https = true                # HTTPS for signaling (enables Talk button in browser)
# local_ip =                  # auto-detected if omitted
# audio_mode = opus           # opus (default, always transcode), auto (passthrough when possible), pcmu (force 8kHz G.711)
# opus_complexity = 2          # 0-10, transcode encoder complexity (lower = less CPU)
# opus_bitrate = 64000         # transcode encoder bitrate (bps)
username = thingino
password = thingino

[motion]
# enabled = false
# algorithm = move            # move, base_move, persondet, yolo
# sensitivity = 3             # move: 0-4, persondet: 0-5
# grid = 4x4                  # move only: auto-generate ROI grid (default 4x4 = 16 zones)
# cooldown_sec = 10
# poll_interval_ms = 500
# skip_frames = 5             # process every Nth frame in IVS
# record = true               # start recording on motion
# record_post_sec = 30        # continue recording after motion stops
# gpio_pin = -1               # GPIO to assert on motion
# Explicit ROI override (disables grid):
# roi_count = 2
# roi0 = 0,0,319,179
# roi1 = 320,180,639,359
#
# persondet options:
# det_distance = 2            # 0=6m 1=8m 2=10m 3=11m 4=13m
# motion_trigger = false      # require motion before running DL
#
# yolo options:
# model = /usr/share/models/magik_model_yolov5.bin
# num_classes = 4             # must match the model
# conf_threshold = 40         # percent (0-100)
# nms_threshold = 50          # percent (0-100)

[push]
# RTMP/RTMPS stream push to external servers (YouTube, Twitch, etc.)
# enabled = false
# url = rtmps://a.rtmps.youtube.com/live2/your-stream-key
# url = rtmp://live.twitch.tv/app/live_your-key
# stream = 0                   # 0=main, 1=sub
# audio = true                 # include audio (transcoded to AAC if needed)
# autostart = true             # start pushing on daemon launch
# reconnect_ms = 5000          # reconnect delay on failure (1000-60000)
# tcp_sndbuf = 262144           # TCP send buffer bytes (default 256KB, absorbs WiFi stalls)

[srt]
# SRT listener daemon — serves MPEG-TS over SRT protocol
# enabled = false               # SRT listener (opt-in)
# port = 9000                   # SRT listener port
# latency = 120                 # SRT latency in ms (TsbPd buffer)
# passphrase =                  # AES encryption passphrase (10-79 chars, empty = none)
# pbkeylen = 16                 # AES key length: 16, 24, or 32
# max_clients = 4               # max simultaneous SRT clients
# stream = 0                    # default video stream (0=main, 1=sub)
# audio = true                  # include audio in TS stream

# -- CPU Affinity and Scheduling (T40/T41/A1 dual-core) --
# Each daemon reads cpu_affinity and sched_priority from its own section.
# cpu_affinity: pin to CPU core (0 or 1). Ignored on single-core SoCs.
# sched_priority: SCHED_FIFO real-time priority (1-99). Omit for SCHED_OTHER.

[rvd]
cpu_affinity = 0
# sched_priority = 50

[rsd]
cpu_affinity = 1
# sched_priority = 30

[rad]
# cpu_affinity = 1
# sched_priority = 40

[rod]
# cpu_affinity = 1

[rhd]
# cpu_affinity = 1

[rwd]
# cpu_affinity = 1
# sched_priority = 30

[rwc]
# cpu_affinity = 1

[rmr]
# cpu_affinity = 1

[rmd]
# cpu_affinity = 1

[rfs]
# cpu_affinity = 1

[rsp]
# cpu_affinity = 1

[rsr]
# cpu_affinity = 1

[ric]
# cpu_affinity = 1

[log]
level = info
# target = syslog                # syslog, stderr, file
# file = /var/log/raptor.log   # path when target = file
